<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sınav Notu Sorgulama</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        
        .container {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        h2 {
            color: #333;
            margin-top: 0;
        }
        
        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
            text-align: center;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 123, 255, 0.2);
            font-weight: bold;
        }
        
        button:hover {
            background-color: #0056b3;
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0, 123, 255, 0.4);
        }
        
        button:active {
            transform: translateY(0);
            box-shadow: 0 2px 4px rgba(0, 123, 255, 0.2);
        }
        
        #sonuc {
            margin-top: 25px;
            font-size: 18px;
        }
        
        .hata {
            color: #dc3545;
            font-weight: bold;
        }
        
        .basari {
            color: #28a745;
        }
        
        .not-deger {
            font-size: 24px;
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }
        
        .karne-tablosu {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 15px;
        }
        
        .karne-tablosu th,
        .karne-tablosu td {
            border: 1px solid #ddd;
            padding: 10px 5px;
            text-align: center;
        }
        
        .karne-tablosu th {
            background-color: #007bff;
            color: white;
        }
        
        .karne-tablosu .ders-adi {
            text-align: left;
            font-weight: bold;
            background-color: #f9f9f9;
            padding-left: 10px;
        }
        
        .toplam-satir {
            font-weight: bold;
            background-color: #e9ecef;
        }
        
        .toplam-satir .ders-adi {
            background-color: #e9ecef;
        }
        
        .puan-kutusu {
            background-color: #e8f4f8;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-weight: bold;
            color: #0056b3;
        }
        
        .sira-kutusu {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            font-size: 14px;
            background: #f8f9fa;
            padding: 12px;
            border-radius: 5px;
            border: 1px solid #eee;
        }
        
        .okul-adi {
            color: #1565c0;
            font-size: 32px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.15);
            font-weight: 900;
        }

        .aciklama {
            color: #d32f2f;
            font-size: 15px;
            font-weight: bold;
            background-color: #fff3f3;
            padding: 15px;
            border-radius: 8px;
            border: 2px dashed #f44336;
            margin-bottom: 25px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(244, 67, 54, 0.15);
        }

        .kurdele-container {
            margin: 20px 0;
            text-align: center;
        }
        
        .kurdele {
            background: linear-gradient(45deg, #ff9800, #ff5722);
            color: white;
            padding: 12px 25px;
            font-size: 17px;
            font-weight: bold;
            display: inline-block;
            border-radius: 4px;
            box-shadow: 0 4px 10px rgba(255, 87, 34, 0.4);
            animation: pulse 1.5s infinite alternate;
            border: 2px dashed rgba(255, 255, 255, 0.6);
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 4px 10px rgba(255, 87, 34, 0.4); }
            100% { transform: scale(1.05); box-shadow: 0 8px 20px rgba(255, 87, 34, 0.6); }
        }
    </style>
    <!-- Harici Şifreleme Kütüphanesi (Sistem hatalarını önlemek için eklendi) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>

<body>

    <div class="container">
        <h1 class="okul-adi">Nazlı İrfan ÖNAL</h1>
        <h2>Deneme Sınavı Sorgulama</h2>
        <div class="aciklama">
            ⚠️ Sınav sonucunuzu ve detaylı karnenizi görmek için lütfen T.C. Kimlik Numaranızı giriniz!
        </div>

        <input type="text" id="tcInput" placeholder="Öğrenci No veya TC">
        <button onclick="notGetir()">Sorgula</button>

        <div id="sonuc"></div>
    </div>

    <script>
        async function notGetir() {
            const tc = document.getElementById('tcInput').value.trim();
            const sonucDiv = document.getElementById('sonuc');

            sonucDiv.innerHTML = "Sorgulanıyor...";
            sonucDiv.className = "";

            if (!tc) {
                sonucDiv.innerHTML = "Lütfen geçerli bir numara giriniz.";
                sonucDiv.className = "hata";
                return;
            }

            try {
                // Girilen TC'yi CryptoJS ile şifrele (Güvenlik engellerine takılmaz)
                const girilenTcHash = CryptoJS.SHA256(tc).toString();

                // JSON'daki verileri getir
                let ogrenciResponse = await fetch('ogrenciler.json').catch(() => null);
                if (!ogrenciResponse || !ogrenciResponse.ok) {
                    ogrenciResponse = await fetch('/static/ogrenciler.json').catch(() => null);
                }
                if (!ogrenciResponse || !ogrenciResponse.ok) {
                    throw new Error("Öğrenci dosyası okunamadı. Uygulamayı yerel olarak açıyorsanız veriler engellenmiş olabilir, lütfen Flask ile çalıştırın.");
                }
                const ogrenciler = await ogrenciResponse.json();

                // Şifreli TC'yi eşleştiriyoruz
                const bulunanOgrenci = ogrenciler.find(ogr => ogr.tc_hash === girilenTcHash);

                if (!bulunanOgrenci) {
                    sonucDiv.innerHTML = "Sisteme kayıtlı böyle bir TC bulunamadı.";
                    sonucDiv.className = "hata";
                    return;
                }

                let notlarResponse = await fetch('notlar.json').catch(() => null);
                if (!notlarResponse || !notlarResponse.ok) {
                    notlarResponse = await fetch('/static/notlar.json').catch(() => null);
                }
                if (!notlarResponse || !notlarResponse.ok) {
                    throw new Error("Notlar dosyası sunucudan okunamadı.");
                }
                const notlar = await notlarResponse.json();

                // Yeni notlar.json formatında "Ad Soyad" key'i üzerinden buluyoruz
                const temizle = (metin) => {
                    return metin.toLocaleLowerCase('tr-TR')
                        .replace(/ı/g, 'i').replace(/i̇/g, 'i')
                        .replace(/ğ/g, 'g').replace(/ü/g, 'u')
                        .replace(/ş/g, 's').replace(/ö/g, 'o').replace(/ç/g, 'c');
                };

                const adSoyad = temizle(bulunanOgrenci.ad + " " + bulunanOgrenci.soyad);
                const hedefKelimeler = adSoyad.split(/\s+/);
                const hedefSoyad = hedefKelimeler[hedefKelimeler.length - 1];

                let foundKey = Object.keys(notlar).find(k => {
                    const jsonAdSoyad = temizle(k);

                    if (jsonAdSoyad === adSoyad) return true;
                    if (jsonAdSoyad.replace(/\s/g, '') === adSoyad.replace(/\s/g, '')) return true;

                    const jsonKelimeler = jsonAdSoyad.split(/\s+/);
                    const jsonSoyad = jsonKelimeler[jsonKelimeler.length - 1];

                    if (hedefSoyad === jsonSoyad) {
                        return jsonKelimeler.some(kelime => kelime !== jsonSoyad && hedefKelimeler.includes(kelime));
                    }
                    return false;
                });

                if (!foundKey) {
                    sonucDiv.innerHTML = `Sayın ${bulunanOgrenci.ad} ${bulunanOgrenci.soyad}, adınıza ait sonuç bulunamadı.`;
                    sonucDiv.className = "hata";
                    return;
                }

                const rawString = notlar[foundKey];
                // PDF'ten gelen eksik/bitişik eksi işaretlerini (örn: 10-1,33 -> 10 -1,33) düzeltir
                const fixedString = rawString.replace(/(\d)-(\d)/g, '$1 -$2');
                const parts = fixedString.trim().split(/\s+/);

                if (parts.length < 29) {
                    sonucDiv.innerHTML = "Sınav verileriniz hatalı veya eksik okundu.";
                    sonucDiv.className = "hata";
                    return;
                }

                const ogrNo = parts[0];
                const sinif = parts[2];
                const kt = parts[3];

                const lgsPuan = parts[25];
                const gnls = parts[26];
                const gnlsSayi = parseInt(gnls, 10);

                let kurdeleHtml = "";
                if (!isNaN(gnlsSayi) && gnlsSayi <= 50) {
                    kurdeleHtml = `
                        <div class="kurdele-container">
                            <div class="kurdele">🎀 Öncelikli Kayıta Hak Kazandınız! 🎀</div>
                        </div>
                    `;
                }

                let detayHtml = `
                    <div style="text-align:center; margin-bottom:15px; font-size:15px; color:#555;">
                        <span><strong>Öğr No:</strong> ${ogrNo}</span> &nbsp;|&nbsp; 
                        <span><strong>Sınıf:</strong> ${sinif}</span> &nbsp;|&nbsp; 
                        <span><strong>Kitapçık:</strong> ${kt}</span>
                    </div>
                    
                    ${kurdeleHtml}

                    <div class="puan-kutusu">
                        <span>LGS Puanı: <span style="font-size:28px; display:block;">${lgsPuan}</span></span>
                    </div>

                    <div class="sira-kutusu">
                        <span><strong>Genel Sıra:</strong> ${gnls}</span>
                    </div>

                    <table class="karne-tablosu">
                        <tr>
                            <th>Ders</th>
                            <th>D</th>
                            <th>Y</th>
                            <th>Net</th>
                        </tr>
                        <tr>
                            <td class="ders-adi">Türkçe</td>
                            <td>${parts[4]}</td><td>${parts[5]}</td><td>${parts[6]}</td>
                        </tr>
                        <tr>
                            <td class="ders-adi">İnkılap Tarihi</td>
                            <td>${parts[7]}</td><td>${parts[8]}</td><td>${parts[9]}</td>
                        </tr>
                        <tr>
                            <td class="ders-adi">Din Kültürü</td>
                            <td>${parts[10]}</td><td>${parts[11]}</td><td>${parts[12]}</td>
                        </tr>
                        <tr>
                            <td class="ders-adi">Yabancı Dil</td>
                            <td>${parts[13]}</td><td>${parts[14]}</td><td>${parts[15]}</td>
                        </tr>
                        <tr>
                            <td class="ders-adi">Matematik</td>
                            <td>${parts[16]}</td><td>${parts[17]}</td><td>${parts[18]}</td>
                        </tr>
                        <tr>
                            <td class="ders-adi">Fen Bilimleri</td>
                            <td>${parts[19]}</td><td>${parts[20]}</td><td>${parts[21]}</td>
                        </tr>
                        <tr class="toplam-satir">
                            <td class="ders-adi">TOPLAM</td>
                            <td>${parts[22]}</td><td>${parts[23]}</td><td>${parts[24]}</td>
                        </tr>
                    </table>
                `;

                sonucDiv.innerHTML = `<h3 style="margin-bottom:10px; color:#333;">Sayın ${bulunanOgrenci.ad} ${bulunanOgrenci.soyad}</h3>${detayHtml}`;
                sonucDiv.className = "basari";

            } catch (hata) {
                console.error("Hata: ", hata);
                sonucDiv.innerHTML = `<strong>Sistem Hatası:</strong> ${hata.message}`;
                sonucDiv.className = "hata";
            }
        }
    </script>
</body>

</html>
